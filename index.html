<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="DailyFlow"/>
<meta name="theme-color" content="#2563EB"/>
<meta name="description" content="日曆任務、番茄鐘、習慣打卡三合一"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192x192.png"/>
<title>每日任務 DailyFlow</title>
<link rel="stylesheet" href="fonts/tabler-icons.min.css"/>
<style>
:root{
  --blue:#2563EB;--blue-dk:#1D4ED8;--blue-lt:#DBEAFE;
  --green-lt:#D1FAE5;--green-dk:#065F46;
  --red:#EF4444;--amber:#F59E0B;
  --bg:#F8FAFC;--surface:#FFFFFF;--border:#E2E8F0;
  --text:#1E293B;--text2:#64748B;--text3:#94A3B8;
  --radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0F172A;--surface:#1E293B;--border:#334155;--text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;--blue-lt:#1E3A8A;--green-lt:#064E3B;--green-dk:#6EE7B7;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;background:var(--surface)}
.header{background:var(--blue);color:#fff;padding:env(safe-area-inset-top,12px) 20px 14px;flex-shrink:0}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding-top:env(safe-area-inset-top,0)}
.header h1{font-size:19px;font-weight:600;letter-spacing:-0.3px}
.header-sub{font-size:12px;opacity:.8;margin-top:2px}
.header-actions{display:flex;gap:6px}
.hdr-btn{background:rgba(255,255,255,.18);border:none;border-radius:8px;padding:6px 8px;color:#fff;cursor:pointer;font-size:18px;line-height:1}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;font-size:11px;color:var(--text2);border-bottom:2.5px solid transparent;transition:.2s;user-select:none}
.tab i{font-size:22px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.section{display:none}.section.active{display:block}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px}
.cal-month{font-size:16px;font-weight:600}
.nav-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:6px 10px;border-radius:var(--radius-sm);font-size:16px}
.nav-btn:active{background:var(--bg)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px 4px}
.dow{text-align:center;font-size:11px;color:var(--text3);padding:4px 0;font-weight:500}
.cal-day{display:flex;flex-direction:column;align-items:center;padding:5px 2px;cursor:pointer;border-radius:var(--radius-sm)}
.cal-day:active{background:var(--bg)}
.day-num{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px}
.cal-day.today .day-num{background:var(--blue);color:#fff;font-weight:600}
.cal-day.selected:not(.today) .day-num{background:var(--blue-lt);color:var(--blue);font-weight:600}
.day-dot{width:4px;height:4px;border-radius:50%;background:var(--red);margin-top:2px}
.day-dot.hidden{visibility:hidden}

/* TASKS */
.tasks-wrap{padding:14px 20px}
.section-label{font-size:12px;color:var(--text2);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.task-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;transition:.15s}
.task-item:active{opacity:.8}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s}
.chk.done{background:var(--blue);border-color:var(--blue)}
.chk.done::after{content:'';display:block;width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.task-body{flex:1;min-width:0;cursor:pointer}
.task-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-name.done{text-decoration:line-through;color:var(--text2)}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.tag-work{background:#DBEAFE;color:#1D4ED8}
.tag-life{background:var(--green-lt);color:var(--green-dk)}
.tag-health{background:#FCE7F3;color:#9D174D}
.task-actions{display:flex;gap:4px;flex-shrink:0}
.task-action-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;font-size:16px;line-height:1;transition:.15s}
.task-action-btn:hover{color:var(--text2);background:var(--bg)}
.task-action-btn.del:hover{color:var(--red)}

.empty-state{text-align:center;padding:32px 20px;color:var(--text3)}
.empty-state i{font-size:40px;display:block;margin-bottom:8px}
.add-btn{display:flex;align-items:center;gap:8px;width:calc(100% - 40px);margin:0 20px 20px;padding:12px 16px;border:1.5px dashed var(--border);border-radius:var(--radius);background:none;color:var(--text2);cursor:pointer;font-size:14px;transition:.2s}
.add-btn:active{background:var(--bg)}

/* FOCUS */
.focus-wrap{padding:20px 20px 32px;display:flex;flex-direction:column;align-items:center;gap:20px}
.mode-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.pill{padding:8px 18px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--surface);transition:.2s;user-select:none}
.pill.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.ring-wrap{position:relative;width:220px;height:220px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:12}
.ring-fill{fill:none;stroke:var(--blue);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-time{font-size:42px;font-weight:300;letter-spacing:-2px;color:var(--text)}
.ring-mode{font-size:13px;color:var(--text2);margin-top:4px}
.pom-dots{display:flex;gap:8px}
.pdot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:.3s}
.pdot.done{background:var(--blue)}
.focus-btns{display:flex;align-items:center;gap:16px}
.fb{width:50px;height:50px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text2);transition:.2s}
.fb:active{background:var(--bg)}
.fb.main{width:66px;height:66px;background:var(--blue);border-color:var(--blue);color:#fff;font-size:28px}
.fb.main:active{background:var(--blue-dk)}
.focus-task{width:100%;background:var(--bg);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--border)}
.focus-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.fstat{background:var(--bg);border-radius:var(--radius);padding:14px;text-align:center;border:1px solid var(--border)}
.fstat-val{font-size:26px;font-weight:500}
.fstat-lbl{font-size:12px;color:var(--text2);margin-top:2px}

/* HABIT */
.habit-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 4px}
.habit-week{display:flex;gap:6px;padding:8px 20px 12px;overflow-x:auto}
.wday{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:38px}
.wd-lbl{font-size:11px;color:var(--text3)}
.wd-n{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2)}
.wd-n.today{background:var(--blue);color:#fff;font-weight:600}
.habit-cards{padding:0 16px 80px}
.hcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.hcard-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.hicon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hinfo{flex:1}
.hname{font-size:14px;font-weight:600}
.hstreak{font-size:12px;color:var(--text2);margin-top:2px}
.hcard-actions{display:flex;gap:4px}
.hcard-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:5px;border-radius:6px;font-size:17px;line-height:1;transition:.15s}
.hcard-btn:hover{color:var(--text2);background:var(--bg)}
.hcard-btn.del:hover{color:var(--red)}
.hchk-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:transparent;transition:.2s;flex-shrink:0}
.hchk-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.week-checks{display:flex;gap:5px;margin-bottom:8px}
.wc{width:24px;height:24px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:.2s;color:transparent}
.wc.done{background:var(--blue-lt);border-color:#93C5FD;color:var(--blue)}
.wc.today-marker{border-width:2px;border-color:var(--blue)}
.pbar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.habit-stat{margin:0 16px 8px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.habit-stat-num{font-size:24px;font-weight:700;line-height:1}
.habit-stat-txt{font-size:12px;opacity:.85;margin-top:2px}
.heat-wrap{overflow:hidden;max-height:0;transition:max-height .35s ease}
.heat-wrap.open{max-height:110px}
.heat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:6px 0 3px}
.heat-cell{height:14px;border-radius:2px;background:var(--border)}
.heat-cell.on{background:rgba(37,99,235,.55)}
.heat-cell.today{background:var(--blue)}
.heat-toggle{display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;color:var(--text3);cursor:pointer;padding:4px 0;margin-top:4px;user-select:none}
.heat-toggle:active{color:var(--text2)}

/* TASK SEARCH */
.search-panel{padding:0 20px;overflow:hidden;max-height:0;transition:max-height .3s ease}
.search-panel.show{max-height:140px}
.search-input-wrap{position:relative;margin-bottom:8px}
.search-input-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);color:var(--text);outline:none}
.search-input:focus{border-color:var(--blue)}
.filter-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{padding:5px 10px;border-radius:14px;font-size:12px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--surface);white-space:nowrap;transition:.15s;user-select:none;flex-shrink:0}
.filter-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.search-date-lbl{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.04em;padding:8px 0 4px}

/* STATS OVERLAY */
.stats-overlay{position:fixed;inset:0;background:var(--bg);z-index:150;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}
.stats-overlay.show{transform:none}
.stats-hdr{background:var(--blue);color:#fff;padding:env(safe-area-inset-top,12px) 20px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.stats-back{background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:6px 10px;color:#fff;cursor:pointer;font-size:18px;line-height:1}
.stats-body{flex:1;overflow-y:auto;padding:16px 20px calc(40px + env(safe-area-inset-bottom,0px))}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.scard-val{font-size:24px;font-weight:700;color:var(--blue)}
.scard-lbl{font-size:11px;color:var(--text2);margin-top:3px}
.hsr{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.hsr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hsr-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hsr-name{font-size:14px;font-weight:600}
.hsr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.hsr-stat{text-align:center}
.hsr-val{font-size:16px;font-weight:600}
.hsr-lbl{font-size:10px;color:var(--text2);margin-top:1px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:100;opacity:0;pointer-events:none;transition:.25s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));width:100%;transform:translateY(40px);transition:.25s}
.overlay.show .modal{transform:none}
.modal h3{font-size:17px;font-weight:600;margin-bottom:16px}
.modal input,.modal select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg);color:var(--text);margin-bottom:12px;outline:none}
.modal input:focus,.modal select:focus{border-color:var(--blue)}
.modal-btns{display:flex;gap:10px;margin-top:4px}
.mbtn{flex:1;padding:13px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:15px;font-weight:500}
.mbtn.cancel{background:var(--bg);color:var(--text2)}
.mbtn.confirm{background:var(--blue);color:#fff}
.mbtn.danger{background:var(--red);color:#fff}

/* CONFIRM DIALOG */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:.2s;padding:20px}
.confirm-overlay.show{opacity:1;pointer-events:all}
.confirm-box{background:var(--surface);border-radius:16px;padding:24px 20px;width:100%;max-width:320px;text-align:center}
.confirm-box h4{font-size:16px;font-weight:600;margin-bottom:8px}
.confirm-box p{font-size:14px;color:var(--text2);margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}

/* TOAST */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sync-dot{position:fixed;top:12px;right:12px;width:8px;height:8px;border-radius:50%;background:#22C55E;z-index:300;opacity:0;transition:.3s}
.sync-dot.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-inner">
      <div>
        <h1 id="hdr-title">每日任務 DailyFlow</h1>
        <div class="header-sub" id="hdr-sub">載入中...</div>
      </div>
      <div class="header-actions">
        <button class="hdr-btn" onclick="syncFromCloud()" aria-label="同步"><i class="ti ti-cloud-upload"></i></button>
        <button class="hdr-btn" onclick="showNotifPrompt()" aria-label="通知"><i class="ti ti-bell"></i></button>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('cal',this)"><i class="ti ti-calendar"></i>日曆</div>
    <div class="tab" onclick="switchTab('focus',this)"><i class="ti ti-clock"></i>專注</div>
    <div class="tab" onclick="switchTab('habit',this)"><i class="ti ti-checks"></i>習慣</div>
  </div>
  <div class="content">

    <!-- CALENDAR -->
    <div class="section active" id="tab-cal">
      <div class="cal-nav">
        <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="cal-month" id="cal-lbl"></span>
        <button class="nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="tasks-wrap">
        <div class="section-label" style="display:flex;align-items:center;justify-content:space-between">
          <span id="task-lbl">今天的任務</span>
          <button onclick="toggleTaskSearch()" style="background:none;border:none;cursor:pointer;color:var(--blue);padding:2px 4px;font-size:16px;line-height:1"><i class="ti ti-search" id="search-icon"></i></button>
        </div>
        <div class="search-panel" id="task-search-panel">
          <div class="search-input-wrap"><i class="ti ti-search"></i><input class="search-input" id="task-search-input" type="search" placeholder="搜尋所有任務..." oninput="onSearchInput(this.value)"/></div>
          <div class="filter-row">
            <div class="filter-chip active" data-group="tag" data-val="" onclick="setFilter(this)">全部</div>
            <div class="filter-chip" data-group="tag" data-val="work" onclick="setFilter(this)">工作</div>
            <div class="filter-chip" data-group="tag" data-val="life" onclick="setFilter(this)">生活</div>
            <div class="filter-chip" data-group="tag" data-val="health" onclick="setFilter(this)">健身</div>
            <div class="filter-chip active" data-group="status" data-val="" onclick="setFilter(this)">全部狀態</div>
            <div class="filter-chip" data-group="status" data-val="todo" onclick="setFilter(this)">待辦</div>
            <div class="filter-chip" data-group="status" data-val="done" onclick="setFilter(this)">完成</div>
          </div>
        </div>
        <div id="task-list"></div>
      </div>
      <button class="add-btn" onclick="openAddTask()"><i class="ti ti-plus"></i>新增任務</button>
    </div>

    <!-- FOCUS -->
    <div class="section" id="tab-focus">
      <div class="focus-wrap">
        <div class="mode-pills">
          <div class="pill active" onclick="setMode('work',this)">專注 25min</div>
          <div class="pill" onclick="setMode('short',this)">短休息 5min</div>
          <div class="pill" onclick="setMode('long',this)">長休息 15min</div>
        </div>
        <div class="ring-wrap">
          <svg width="220" height="220" viewBox="0 0 220 220">
            <circle class="ring-bg" cx="110" cy="110" r="96"/>
            <circle class="ring-fill" id="ring" cx="110" cy="110" r="96" stroke-dasharray="603" stroke-dashoffset="0"/>
          </svg>
          <div class="ring-text">
            <div class="ring-time" id="timer-disp">25:00</div>
            <div class="ring-mode" id="timer-mode">專注時間</div>
          </div>
        </div>
        <div class="pom-dots" id="pom-dots">
          <div class="pdot"></div><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div>
        </div>
        <div class="focus-btns">
          <button class="fb" onclick="resetTimer()"><i class="ti ti-refresh"></i></button>
          <button class="fb main" onclick="toggleTimer()"><i class="ti ti-player-play" id="play-icon"></i></button>
          <button class="fb" onclick="skipTimer()"><i class="ti ti-player-skip-forward"></i></button>
        </div>
        <div class="focus-task" onclick="pickTask()">
          <i class="ti ti-target" style="font-size:22px;color:var(--blue)"></i>
          <div>
            <div style="font-size:12px;color:var(--text2)">目前專注任務</div>
            <div style="font-size:14px;font-weight:500" id="focus-task">點此從待辦選取任務</div>
          </div>
        </div>
        <div class="focus-stats">
          <div class="fstat"><div class="fstat-val" id="s-today">0</div><div class="fstat-lbl">今日番茄鐘</div></div>
          <div class="fstat"><div class="fstat-val" id="s-min">0</div><div class="fstat-lbl">今日專注分鐘</div></div>
        </div>
      </div>
    </div>

    <!-- HABIT -->
    <div class="section" id="tab-habit">
      <div class="habit-hdr">
        <span style="font-size:16px;font-weight:600">習慣追蹤</span>
        <div style="display:flex;gap:8px">

// ── SUPABASE SYNC ─────────────────────────────────────
async function syncFromCloud(){
  showToast('同步中... ☁️',5000);
  try{
    // 1. 推送本地任務到雲端（數字ID=離線建立需insert，字串UUID=已同步需upsert）
    for(const [date_key,list] of Object.entries(tasks)){
      for(const t of list){
        if(typeof t.id==='number'){
          const {data}=await sb.from('tasks').insert({date_key,text:t.text,tag:t.tag,done:t.done}).select().single();
          if(data) t.id=data.id;
        } else {
          await sb.from('tasks').upsert({id:t.id,date_key,text:t.text,tag:t.tag,done:t.done});
        }
      }
    }
    saveData('df_tasks',tasks);

    // 2. 推送本地習慣到雲端
    for(const h of habits){
      if(typeof h.id==='number'){
        const {data}=await sb.from('habits').insert({name:h.name,icon:h.icon,color:h.color,streak:h.streak,total:h.total,checks:h.checks}).select().single();
        if(data) h.id=data.id;
      } else {
        await sb.from('habits').upsert({id:h.id,name:h.name,icon:h.icon,color:h.color,streak:h.streak,total:h.total,checks:h.checks});
      }
    }
    saveData('df_habits',habits);

    // 3. 從雲端拉取最新資料
    const {data:tData,error:tErr}=await sb.from('tasks').select('*');
    if(!tErr&&tData){
      tasks={};
      tData.forEach(t=>{
        if(!tasks[t.date_key]) tasks[t.date_key]=[];
        tasks[t.date_key].push({id:t.id,text:t.text,tag:t.tag,done:t.done});
      });
      saveData('df_tasks',tasks);
    }
    const {data:hData,error:hErr}=await sb.from('habits').select('*');
    if(!hErr&&hData){
      if(hData.length){
        habits=hData.map(h=>({id:h.id,name:h.name,icon:h.icon,color:h.color,streak:h.streak,total:h.total,checks:h.checks||{}}));
        saveData('df_habits',habits);
      } else if(!habits.length){
        await addDefaultHabits();
      } else {
        habits=[];saveData('df_habits',habits);
      }
    }
    const {data:fData}=await sb.from('focus_stats').select('*').eq('date_key',todayKey()).maybeSingle();
    if(fData){pomCount=fData.pom_count;saveData('df_pom_'+todayKey(),pomCount);}
    document.getElementById('s-today').textContent=pomCount;
    document.getElementById('s-min').textContent=pomCount*25;
    renderCal();renderTasks();renderHabits();
    document.getElementById('hdr-sub').textContent=pendingSummary();
    showSyncDot();showToast('同步完成 ✓');
  }catch(e){showToast('離線模式，資料存本地');}
}
async function addDefaultHabits(){
  const defaults=[{name:'早起 6:30',icon:'🌅',color:'#FEF3C7'},{name:'喝水 8 杯',icon:'💧',color:'#DBEAFE'},{name:'慢跑健走',icon:'🏃',color:'#D1FAE5'}];
  for(const h of defaults){
    const {data}=await sb.from('habits').insert({...h,streak:0,total:0,checks:{}}).select().single();
    if(data) habits.push({...data,checks:data.checks||{}});
  }
  saveData('df_habits',habits);
}
function showSyncDot(){const d=document.getElementById('sync-dot');d.classList.add('show');setTimeout(()=>d.classList.remove('show'),2000);}

// ── CALENDAR ──────────────────────────────────────────
function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('cal-lbl').textContent=MONTHS[m]+' '+y;
  const first=new Date(y,m,1).getDay();

  const g=document.getElementById('cal-grid');
  g.innerHTML=DAYS.map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) g.insertAdjacentHTML('beforeend','<div></div>');
  for(let d=1;d<=daysInMonth;d++){
    const isT=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
    const isSel=d===selDay;
    const k=`${y}-${m+1}-${d}`;
    const hasTasks=(tasks[k]||[]).length>0;
    let cls='cal-day';if(isT) cls+=' today';else if(isSel) cls+=' selected';
    g.insertAdjacentHTML('beforeend',
      `<div class="${cls}" onclick="selectDay(${d})">
        <div class="day-num">${d}</div>
        <div class="day-dot${hasTasks?'':' hidden'}"></div>
      </div>`);

function selectDay(d){selDay=d;renderCal();renderTasks();}

// ── TASKS ─────────────────────────────────────────────
function taskItemHtml(k,t){
  return `<div class="task-item">
      <div class="chk${t.done?' done':''}" onclick="toggleTask('${k}',${t.id})"></div>
      <div class="task-body" onclick="toggleTask('${k}',${t.id})"><div class="task-name${t.done?' done':''}">${t.text}</div></div>
      <span class="tag tag-${t.tag}">${TAG_LABEL[t.tag]}</span>
      <div class="task-actions">
        <button class="task-action-btn" onclick="openEditTask('${k}',${t.id})" aria-label="編輯"><i class="ti ti-pencil"></i></button>
        <button class="task-action-btn del" onclick="confirmDeleteTask('${k}',${t.id},'${t.text}')" aria-label="刪除"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
}
function fmtDateLbl(k){
  const [y,m,d]=k.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const dow=['日','一','二','三','四','五','六'][dt.getDay()];
  return `${y}/${m}/${d}（${dow}）${k===todayKey()?' · 今天':''}`;
}
function renderTasks(){
  const c=document.getElementById('task-list');
  const searching=taskSearch.active&&(taskSearch.query||taskSearch.tag||taskSearch.status);
  if(searching){
    let res=[];
    Object.entries(tasks).forEach(([dk,list])=>{
      list.forEach(t=>{
        if(taskSearch.query&&!t.text.toLowerCase().includes(taskSearch.query)) return;
        if(taskSearch.tag&&t.tag!==taskSearch.tag) return;
        if(taskSearch.status==='todo'&&t.done) return;
        if(taskSearch.status==='done'&&!t.done) return;
        res.push({...t,dk});
      });
    });
    res.sort((a,b)=>{
      const [ay,am,ad]=a.dk.split('-').map(Number),[by,bm,bd]=b.dk.split('-').map(Number);
      return new Date(ay,am-1,ad)-new Date(by,bm-1,bd);
    });
    document.getElementById('task-lbl').textContent=`找到 ${res.length} 筆`;
    if(!res.length){c.innerHTML=`<div class="empty-state"><i class="ti ti-search"></i>沒有符合的任務</div>`;return;}
    let html='',last='';
    res.forEach(t=>{
      if(t.dk!==last){html+=`<div class="search-date-lbl">${fmtDateLbl(t.dk)}</div>`;last=t.dk;}
      html+=taskItemHtml(t.dk,t);
    });
    c.innerHTML=html;
    return;
  }
  const k=selKey();const list=tasks[k]||[];
  document.getElementById('task-lbl').textContent=k===todayKey()?'今天的任務':`${selDay} 日的任務`;
  if(!list.length){c.innerHTML=`<div class="empty-state"><i class="ti ti-clipboard-list"></i>這天沒有任務<br><span style="font-size:13px">點下方新增</span></div>`;return;}
  c.innerHTML=list.map(t=>taskItemHtml(k,t)).join('');
}

async function toggleTask(k,id){
  const t=(tasks[k]||[]).find(x=>x.id===id);
  if(!t) return;
  t.done=!t.done;
  saveData('df_tasks',tasks);renderTasks();renderCal();
  if(t.done) showToast('任務完成 ✓');
  try{await sb.from('tasks').update({done:t.done}).eq('id',id);}catch(e){}
}

}

function openEditTask(k,id){
  const t=(tasks[k]||[]).find(x=>x.id===id);
  if(!t) return;
  editingTaskId=id;editingTaskKey=k;
  document.getElementById('task-modal-title').textContent='編輯任務';
  document.getElementById('task-input').value=t.text;
  document.getElementById('task-tag').value=t.tag;
  document.getElementById('task-modal').classList.add('show');
  setTimeout(()=>document.getElementById('task-input').focus(),300);
}

async function saveTask(){
  const text=document.getElementById('task-input').value.trim();
  if(!text){showToast('請輸入任務名稱');return;}
  const tag=document.getElementById('task-tag').value;
  closeModal('task-modal');

  if(editingTaskId){
    // 編輯模式
    const t=(tasks[editingTaskKey]||[]).find(x=>x.id===editingTaskId);
    if(t){t.text=text;t.tag=tag;}
    saveData('df_tasks',tasks);renderTasks();renderCal();
    showToast('任務已更新');
    try{await sb.from('tasks').update({text,tag}).eq('id',editingTaskId);}catch(e){}
  } else {
    // 新增模式
    const k=selKey();
    let newId=Date.now();
    if(!tasks[k]) tasks[k]=[];
    tasks[k].push({id:newId,text,tag,done:false});
    saveData('df_tasks',tasks);renderCal();renderTasks();
    showToast('已新增任務');
    try{
      const {data}=await sb.from('tasks').insert({date_key:k,text,tag,done:false}).select().single();
      if(data){
        const item=tasks[k].find(x=>x.id===newId);
        if(item) item.id=data.id;
        saveData('df_tasks',tasks);renderTasks();
      }
    }catch(e){}
  }
}

function confirmDeleteTask(k,id,text){
  showConfirm('刪除任務',`確定要刪除「${text}」嗎？`,async()=>{
    tasks[k]=(tasks[k]||[]).filter(x=>x.id!==id);
    if(tasks[k].length===0) delete tasks[k];
    saveData('df_tasks',tasks);renderCal();renderTasks();
    showToast('任務已刪除');
    try{await sb.from('tasks').delete().eq('id',id);}catch(e){}
  });
}

// ── TIMER ─────────────────────────────────────────────
let curMode='work',totalSec=25*60,remSec=25*60,running=false,tInt=null;
function setMode(m,el){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  curMode=m;totalSec=MODES[m].sec;remSec=totalSec;
  if(running){clearInterval(tInt);running=false;}
  document.getElementById('play-icon').className='ti ti-player-play';
  document.getElementById('timer-mode').textContent=MODES[m].label;
  updateRing();
}
function updateRing(){
  const m=String(Math.floor(remSec/60)).padStart(2,'0');
  const s=String(remSec%60).padStart(2,'0');
  document.getElementById('timer-disp').textContent=m+':'+s;
  document.getElementById('ring').style.strokeDashoffset=CIRC*(1-remSec/totalSec);
}
function toggleTimer(){
  running=!running;
  document.getElementById('play-icon').className=running?'ti ti-player-pause':'ti ti-player-play';
  if(running){
    tInt=setInterval(async()=>{
      if(remSec>0){remSec--;updateRing();}
      else{
        clearInterval(tInt);running=false;
        document.getElementById('play-icon').className='ti ti-player-play';
        if(curMode==='work'){
          pomCount++;saveData('df_pom_'+todayKey(),pomCount);
          document.getElementById('s-today').textContent=pomCount;
          document.getElementById('s-min').textContent=pomCount*25;
          try{await sb.from('focus_stats').upsert({date_key:todayKey(),pom_count:pomCount},{onConflict:'date_key'});}catch(e){}
        }
        if(Notification.permission==='granted'){
          new Notification('DailyFlow',{body:curMode==='work'?'番茄鐘完成！休息一下 🎉':'休息結束，繼續專注 💪',icon:'icons/icon-192x192.png'});
        }
        showToast(curMode==='work'?'番茄鐘完成 🎉':'休息結束！');
        remSec=totalSec;updateRing();
      }
    },1000);
  } else clearInterval(tInt);
}
function resetTimer(){running=false;clearInterval(tInt);remSec=totalSec;document.getElementById('play-icon').className='ti ti-player-play';updateRing();}
function skipTimer(){resetTimer();}
function pickTask(){

  const pick=all[Math.floor(Math.random()*all.length)];

}

// ── HABITS ────────────────────────────────────────────
function calcStreak(checks){
  let streak=0;const d=new Date(today);
  if(!checks[dateKey(d)]) d.setDate(d.getDate()-1);
  while(checks[dateKey(d)]){streak++;d.setDate(d.getDate()-1);}
  return streak;
}

  const row=document.getElementById('habit-week');
  const start=new Date(today);start.setDate(today.getDate()-today.getDay());
  row.innerHTML='';
  for(let i=0;i<7;i++){
    const dd=new Date(start);dd.setDate(start.getDate()+i);
    const isT=dateKey(dd)===todayKey();
    row.insertAdjacentHTML('beforeend',
      `<div class="wday"><div class="wd-lbl">${DAYS[i]}</div><div class="wd-n${isT?' today':''}">${dd.getDate()}</div></div>`);
  }
}

  const hStart=new Date(today);hStart.setDate(today.getDate()-today.getDay()-21);
  cards.innerHTML=habits.map(h=>{
    const weekKeys=Array.from({length:7},(_,i)=>{const d=new Date(wStart);d.setDate(wStart.getDate()+i);return dateKey(d);});
    const done=weekKeys.filter(k=>h.checks[k]).length;
    const pct=Math.round(done/7*100);
    const wcs=weekKeys.map((k,i)=>`<div class="wc${h.checks[k]?' done':''}${k===tKey?' today-marker':''}" onclick="toggleHabitDay(${h.id},'${k}')">${h.checks[k]?'✓':''}</div>`).join('');
    const heatCells=Array.from({length:28},(_,i)=>{
      const d=new Date(hStart);d.setDate(hStart.getDate()+i);

    }).join('');
    return `<div class="hcard">
      <div class="hcard-top">

          <button class="hcard-btn" onclick="openEditHabit(${h.id})" aria-label="編輯"><i class="ti ti-pencil"></i></button>
          <button class="hcard-btn del" onclick="confirmDeleteHabit(${h.id},'${h.name}')" aria-label="刪除"><i class="ti ti-trash"></i></button>
          <button class="hchk-btn${h.checks[tKey]?' on':''}" onclick="toggleHabitDay(${h.id},'${tKey}')">${h.checks[tKey]?'✓':''}</button>
        </div>
      </div>
      <div class="week-checks">${wcs}</div>
      <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:6px">
        <span style="font-size:12px;color:var(--text2)">本週 ${pct}%</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="heat-toggle" onclick="toggleHabitHistory(${h.id})"><i class="ti ti-chart-bar" style="font-size:13px"></i>過去 4 週記錄</div>
      <div class="heat-wrap" id="heat-${h.id}">
        <div class="heat-grid">${heatCells}</div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);padding:0 1px"><span>4 週前</span><span>本週</span></div>
      </div>
    </div>`;
  }).join('');
}

async function toggleHabitDay(id,key){
  const h=habits.find(x=>x.id===id);if(!h) return;
  const was=!!h.checks[key];
  h.checks[key]=was?0:1;
  if(!was){h.total++;showToast(h.name+' 打卡成功 🎯');}
  else{h.total=Math.max(0,h.total-1);}
  h.streak=calcStreak(h.checks);
  saveData('df_habits',habits);renderHabits();
  try{await sb.from('habits').update({checks:h.checks,streak:h.streak,total:h.total}).eq('id',id);}catch(e){}
}
function toggleHabitHistory(id){
  const el=document.getElementById('heat-'+id);
  if(el) el.classList.toggle('open');
}

function openAddHabit(){
  editingHabitId=null;
  document.getElementById('habit-modal-title').textContent='新增習慣';
  document.getElementById('habit-input').value='';
  document.getElementById('habit-emoji').value='⭐';
  document.getElementById('habit-modal').classList.add('show');
  setTimeout(()=>document.getElementById('habit-input').focus(),300);
}

function openEditHabit(id){
  const h=habits.find(x=>x.id===id);if(!h) return;
  editingHabitId=id;
  document.getElementById('habit-modal-title').textContent='編輯習慣';
  document.getElementById('habit-input').value=h.name;
  document.getElementById('habit-emoji').value=h.icon;
  document.getElementById('habit-modal').classList.add('show');
  setTimeout(()=>document.getElementById('habit-input').focus(),300);
}

async function saveHabit(){
  const name=document.getElementById('habit-input').value.trim();
  if(!name){showToast('請輸入習慣名稱');return;}
  const icon=document.getElementById('habit-emoji').value;
  closeModal('habit-modal');

  if(editingHabitId){
    // 編輯模式
    const h=habits.find(x=>x.id===editingHabitId);
    if(h){h.name=name;h.icon=icon;}
    saveData('df_habits',habits);renderHabits();
    showToast('習慣已更新');
    try{await sb.from('habits').update({name,icon}).eq('id',editingHabitId);}catch(e){}
  } else {
    // 新增模式
    const colors=['#FEF3C7','#DBEAFE','#D1FAE5','#FCE7F3','#F3E8FF'];
    const color=colors[habits.length%colors.length];
    showToast('習慣已新增');
    try{
      const {data}=await sb.from('habits').insert({name,icon,color,streak:0,total:0,checks:{}}).select().single();
      if(data){habits.push({...data,checks:{}});}
      else{habits.push({id:Date.now(),name,icon,color,streak:0,total:0,checks:{}});}
    }catch(e){
      habits.push({id:Date.now(),name,icon,color:'#DBEAFE',streak:0,total:0,checks:{}});
    }
    saveData('df_habits',habits);renderHabits();
  }
}

function confirmDeleteHabit(id,name){
  showConfirm('刪除習慣',`確定要刪除「${name}」嗎？所有打卡記錄也會一併刪除。`,async()=>{
    habits=habits.filter(x=>x.id!==id);
    saveData('df_habits',habits);renderHabits();
    showToast('習慣已刪除');
    try{await sb.from('habits').delete().eq('id',id);}catch(e){}
  });
}

// ── CONFIRM DIALOG ────────────────────────────────────
let confirmCallback=null;
function showConfirm(title,msg,callback){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  confirmCallback=callback;
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(){
  document.getElementById('confirm-overlay').classList.remove('show');
  confirmCallback=null;
}
document.getElementById('confirm-ok-btn').addEventListener('click',()=>{
  if(confirmCallback) confirmCallback();
  closeConfirm();
});

// ── MODAL / TOAST ─────────────────────────────────────
function closeModal(id,e){
  if(e&&e.target!==document.getElementById(id)) return;
  document.getElementById(id).classList.remove('show');
}
let toastTimer;
function showToast(msg,duration=2200){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),duration);
}
function showNotifPrompt(){
  if(!('Notification' in window)){showToast('此瀏覽器不支援通知');return;}
  Notification.requestPermission().then(p=>showToast(p==='granted'?'已開啟提醒通知 🔔':'提醒通知未開啟'));
}

// ── TASK SEARCH ───────────────────────────────────────
function toggleTaskSearch(){
  taskSearch.active=!taskSearch.active;
  document.getElementById('task-search-panel').classList.toggle('show',taskSearch.active);
  document.getElementById('search-icon').className=taskSearch.active?'ti ti-x':'ti ti-search';
  if(!taskSearch.active){
    taskSearch.query='';taskSearch.tag='';taskSearch.status='';
    document.getElementById('task-search-input').value='';

  }
  renderTasks();
  if(taskSearch.active) setTimeout(()=>document.getElementById('task-search-input').focus(),300);
}
function onSearchInput(val){taskSearch.query=(val||'').trim().toLowerCase();renderTasks();}
function setFilter(el){
  const g=el.dataset.group,v=el.dataset.val;
  el.closest('.filter-row').querySelectorAll(`[data-group="${g}"]`).forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  taskSearch[g]=v;
  renderTasks();
}

// ── HABIT STATS ───────────────────────────────────────
function calcBestStreak(checks){
  const keys=Object.keys(checks).filter(k=>checks[k]).sort((a,b)=>{
    const [ay,am,ad]=a.split('-').map(Number),[by,bm,bd]=b.split('-').map(Number);
    return new Date(ay,am-1,ad)-new Date(by,bm-1,bd);
  });
  if(!keys.length) return 0;
  let best=1,cur=1;
  for(let i=1;i<keys.length;i++){
    const [py,pm,pd]=keys[i-1].split('-').map(Number),[cy,cm,cd]=keys[i].split('-').map(Number);
    const diff=(new Date(cy,cm-1,cd)-new Date(py,pm-1,pd))/86400000;
    if(diff===1){cur++;best=Math.max(best,cur);}else cur=1;
  }
  return best;
}
function calcMonthRate(checks){
  const y=today.getFullYear(),m=today.getMonth()+1,d=today.getDate();
  let cnt=0;for(let i=1;i<=d;i++) if(checks[`${y}-${m}-${i}`]) cnt++;
  return Math.round(cnt/d*100);
}
function openStats(){
  const tKey=todayKey();
  const todayDone=habits.filter(h=>h.checks[tKey]).length;
  const totalCheckins=habits.reduce((s,h)=>s+h.total,0);
  const avgStreak=habits.length?Math.round(habits.reduce((s,h)=>s+h.streak,0)/habits.length):0;
  let html=`<div class="stats-grid">
    <div class="scard"><div class="scard-val">${habits.length}</div><div class="scard-lbl">追蹤習慣數</div></div>
    <div class="scard"><div class="scard-val">${todayDone}/${habits.length}</div><div class="scard-lbl">今日完成</div></div>
    <div class="scard"><div class="scard-val">${avgStreak}</div><div class="scard-lbl">平均連續天</div></div>
    <div class="scard"><div class="scard-val">${totalCheckins}</div><div class="scard-lbl">累計打卡次</div></div>
  </div><div class="section-label" style="margin-bottom:12px">各習慣詳情</div>`;
  habits.forEach(h=>{
    const best=calcBestStreak(h.checks);
    const mRate=calcMonthRate(h.checks);
    const wStart=new Date(today);wStart.setDate(today.getDate()-today.getDay());
    const wDone=Array.from({length:7},(_,i)=>{const d=new Date(wStart);d.setDate(wStart.getDate()+i);return dateKey(d);}).filter(k=>h.checks[k]).length;
    html+=`<div class="hsr">
      <div class="hsr-top"><div class="hsr-icon" style="background:${h.color}">${h.icon}</div><div class="hsr-name">${h.name}</div></div>
      <div class="hsr-grid">
        <div class="hsr-stat"><div class="hsr-val">${h.streak}</div><div class="hsr-lbl">目前連續</div></div>
        <div class="hsr-stat"><div class="hsr-val">${best}</div><div class="hsr-lbl">最長連續</div></div>
        <div class="hsr-stat"><div class="hsr-val">${Math.round(wDone/7*100)}%</div><div class="hsr-lbl">本週完成</div></div>
        <div class="hsr-stat"><div class="hsr-val">${mRate}%</div><div class="hsr-lbl">本月完成</div></div>
      </div>
      <div class="pbar"><div class="pfill" style="width:${mRate}%"></div></div>
    </div>`;
  });
  if(!habits.length) html+=`<div class="empty-state"><i class="ti ti-chart-bar"></i>還沒有習慣資料</div>`;
  document.getElementById('stats-body').innerHTML=html;
  document.getElementById('stats-overlay').classList.add('show');
}
function closeStats(){document.getElementById('stats-overlay').classList.remove('show');}

// ── KEYBOARD ──────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('task-modal').classList.contains('show')) saveTask();
    if(document.getElementById('habit-modal').classList.contains('show')) saveHabit();
  }
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.show').forEach(o=>o.classList.remove('show'));
    closeConfirm();
    closeStats();
    if(taskSearch.active) toggleTaskSearch();
  }
});
